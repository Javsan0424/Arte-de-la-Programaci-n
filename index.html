<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dino Game - Versión Original</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div id="game-container">
        <div id="score">Puntos: 0</div>

        <div id="menu-inicio">
            <h1>Dino Jump</h1>
            <p>Presiona ESPACIO o haz CLICK para empezar</p>
        </div>

        <div id="dino"></div>
        <div id="cactus"></div>

        <div id="menu-gameover" class="hidden">
            <h1>¡FIN DEL JUEGO!</h1>
            <p>Puntuación final: <span id="final-score">0</span></p>
            <button onclick="startGame()">Reintentar</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
